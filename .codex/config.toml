#:schema https://developers.openai.com/codex/config-schema.json

default_permissions = "repo-workspace-write"

[agents]
max_threads = 6
max_depth = 1

[permissions.repo-workspace-write]
extends = ":workspace"

[permissions.repo-workspace-write.filesystem]
glob_scan_max_depth = 3

[permissions.repo-workspace-write.filesystem.":workspace_roots"]
"." = "write"
".env" = "deny"
".env.*" = "deny"
"web/src/generated" = "deny"
"contracts/openapi/.build" = "deny"
".codex/state" = "write"

[mcp_servers.aspire]
command = "aspire"
args = ["agent", "mcp"]

[mcp_servers.postgres]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres", "postgresql://postgres:postgres@localhost:5432/app?sslmode=disable"]

[mcp_servers.neo4j-graphrag]
command = "python"
args = ["-c", "from mcp_neo4j_graphrag import main; main()"]

[mcp_servers.neo4j-graphrag.env]
NEO4J_URI = "bolt://localhost:7687"
NEO4J_USERNAME = "neo4j"
NEO4J_PASSWORD = "neo4j"
NEO4J_DATABASE = "neo4j"
OPENAI_API_KEY = ""
EMBEDDING_MODEL = "text-embedding-3-small"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.github]
type = "http"
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]
