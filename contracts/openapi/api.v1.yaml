          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Internal Server Error
      tags:
        - Events
  /api/events/{eventId}:
    get:
      operationId: GetEventDetails
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            format: int32
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
